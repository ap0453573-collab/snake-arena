<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Arena - Emoji Tournament Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none; /* Prevents mobile double-tap zoom and scrolling */
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #070614 !important;
            font-family: 'Segoe UI', Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #ffffff;
            font-size: 20px;
            font-weight: bold;
            z-index: 5;
            pointer-events: none;
            display: none;
        }
        
        .screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(15, 10, 35, 0.98) 0%, rgba(5, 5, 15, 0.98) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            color: white;
            text-align: center;
            padding: 15px;
            overflow-y: auto;
        }
        
        h1 {
            font-size: clamp(32px, 8vw, 50px);
            font-weight: 900;
            background: linear-gradient(45deg, #00ff88, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        
        .subtitle {
            color: #a4b0be;
            font-size: clamp(12px, 4vw, 16px);
            margin-bottom: 15px;
        }

        .name-input-container {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .name-input-container label {
            font-size: 11px;
            color: #00ff88;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .name-input-container input {
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(255, 255, 255, 0.15);
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            outline: none;
            width: 240px;
            transition: all 0.2s;
        }
        .name-input-container input:focus {
            border-color: #00ff88;
            background: rgba(255, 255, 255, 0.1);
        }

        .tab-headers {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tab-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #dcdde1;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: #00ff88;
            color: #070614;
            border-color: #00ff88;
        }

        .custom-box {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 25px;
            width: 100%;
            max-width: 500px;
            min-height: 140px;
        }
        .grid-view {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            max-height: 160px;
            overflow-y: auto;
            padding-right: 3px;
        }

        .grid-view::-webkit-scrollbar { width: 4px; }
        .grid-view::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
        
        .color-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
        }
        .color-btn.active { border-color: #ffffff; }

        .flag-btn {
            background: rgba(255, 255, 255, 0.07);
            border: 2px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 6px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .flag-btn.active {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.15);
        }

        .action-btn {
            background: linear-gradient(45deg, #00ff88, #00ee77);
            color: #070614;
            border: none;
            padding: 12px 36px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.3);
        }
        .action-btn.secondary {
            background: linear-gradient(45deg, #70a1ff, #1e90ff);
            color: white;
            box-shadow: 0 5px 20px rgba(30, 144, 255, 0.3);
        }
        .btn-group { display: flex; gap: 15px; justify-content: center; }

        #game-over-screen h1 { color: #ff4757; background: none; -webkit-text-fill-color: #ff4757; }
        #final-score { font-size: 20px; margin-bottom: 25px; color: #a4b0be; }

        /* Virtual Joystick Indicator Layer for Mobile Only */
        #touch-indicator {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 3px dashed rgba(0, 255, 136, 0.4);
            border-radius: 50%;
            display: none;
            pointer-events: none;
            z-index: 2;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div id="ui-layer">Score: <span id="score">0</span></div>
    <div id="touch-indicator"></div>

    <div id="start-screen" class="screen-overlay">
        <h1>SNAKE ARENA</h1>
        <div class="subtitle">Mobile Touch & Emoji Edition</div>
        
        <div class="name-input-container">
            <label for="playerNameInput">Warrior Nickname</label>
            <input type="text" id="playerNameInput" value="Player Snake" maxlength="12">
        </div>

        <div class="tab-headers">
            <button id="tabColors" class="tab-btn active" onclick="switchTab('colors')">Skins</button>
            <button id="tabFlags" class="tab-btn" onclick="switchTab('flags')">Flags</button>
            <button id="tabEmojiSmilies" class="tab-btn" onclick="switchTab('emoji_smilies')">😀 Faces</button>
            <button id="tabEmojiWarriors" class="tab-btn" onclick="switchTab('emoji_warriors')">😎 Cool</button>
            <button id="tabEmojiAnimals" class="tab-btn" onclick="switchTab('emoji_animals')">🦁 Animals</button>
        </div>

        <div class="custom-box">
            <div class="grid-view" id="customizerContainer"></div>
        </div>
        
        <button class="action-btn" onclick="startGame()">Enter Arena</button>
    </div>

    <div id="game-over-screen" class="screen-overlay" style="display: none;">
        <h1>GAME OVER</h1>
        <div id="final-score">Score: 0</div>
        
        <div class="btn-group">
            <button class="action-btn" onclick="tryAgain()">Play Again</button>
            <button class="action-btn secondary" onclick="backToMenu()">Menu</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d", { alpha: false }); 
        const scoreElement = document.getElementById("score");
        const uiLayer = document.getElementById("ui-layer");
        const startScreen = document.getElementById("start-screen");
        const gameOverScreen = document.getElementById("game-over-screen");
        const finalScoreElement = document.getElementById("final-score");
        const customizerContainer = document.getElementById("customizerContainer");
        const playerNameInput = document.getElementById("playerNameInput");
        const touchIndicator = document.getElementById("touch-indicator");

        let score = 0;
        let gameOver = false;
        let gameStarted = false;
        let inMenu = true;
        let mouse = { x: 0, y: 0 };
        let isDrawingTouch = false;
        let pulseTime = 0; 
        let activeTab = 'colors'; 
        
        const thickness = 14;
        const snakeSpeed = 4.2;
        const attackRange = 220;
        const dangerSensorRange = 75;

        let player;
        let npcs = [];
        let foodArray = [];
        const cacheMap = {};

        const clothingColors = [
            { hex: "#00ff88", name: "Green" }, { hex: "#00f2fe", name: "Cyan" },
            { hex: "#ff4757", name: "Pink" }, { hex: "#ffa502", name: "Orange" },
            { hex: "#be2edd", name: "Purple" }, { hex: "#eccc68", name: "Yellow" }
        ];

        const flagSkins = [
            { id: "USA", emoji: "🇺🇸", name: "USA" }, { id: "GB", emoji: "🇬🇧", name: "UK" },
            { id: "FR", emoji: "🇫🇷", name: "FR" }, { id: "DE", emoji: "🇩🇪", name: "DE" },
            { id: "CA", emoji: "🇨🇦", name: "CA" }, { id: "BR", emoji: "🇧🇷", name: "BR" },
            { id: "IN", emoji: "🇮🇳", name: "IN" }, { id: "JP", emoji: "🇯🇵", name: "JP" }
        ];

        // 40+ Emojis sorted by category arrays
        const emojiCategories = {
            emoji_smilies: ["😀","😃","😄","😁","😆","😅","😂","🤣","😊","😇","🙂","🙃","😉","😌","😍","🥰","😘","😜","🤪","😝","🤑","🤗"],
            emoji_warriors: ["😎","🤓","🧐","🤠","🥳","🤡","👹","👺","👻","👽","🤖","👑","⚔️","🥷","🦸","🦹","🔥","⚡","💎"],
            emoji_animals: ["🦁","🐯","🐱","🐶","🐺","🐻","🐼","🐨","🦄","🐮","🐷","🐸","🐵","🐔","🐧","🦆","🦅","🦉","🦇","👑"]
        };

        const npcNames = ["Goku", "Vegeta", "Trunks", "Frieza", "Broly", "Piccolo", "Gohan", "Luffy", "Naruto", "Sasuke", "Zoro"];

        let selectedSkin = { type: 'color', val: '#00ff88' }; 
        let selectedEmojiFace = "😀"; 

        function forceResize() {
            canvas.width = window.innerWidth || 1280;
            canvas.height = window.innerHeight || 720;
        }
        window.addEventListener('resize', forceResize);
        window.addEventListener('orientationchange', () => setTimeout(forceResize, 200));
        forceResize();

        function preRenderFlagTextures() {
            const size = 36; const radius = size / 2;
            flagSkins.forEach(flag => {
                const offCanvas = document.createElement('canvas'); offCanvas.width = size; offCanvas.height = size;
                const oCtx = offCanvas.getContext('2d');
                oCtx.beginPath(); oCtx.arc(radius, radius, radius, 0, Math.PI * 2); oCtx.clip();
                let fid = flag.id;
                if (fid === "USA") {
                    oCtx.fillStyle = "#ff4757"; oCtx.fillRect(0, 0, size, size); oCtx.fillStyle = "#ffffff";
                    for(let j=0; j<size; j+=5) oCtx.fillRect(0, j, size, 2);
                    oCtx.fillStyle = "#2f3542"; oCtx.fillRect(0, 0, radius, radius);
                } else if (fid === "GB") {
                    oCtx.fillStyle = "#2f3542"; oCtx.fillRect(0, 0, size, size); oCtx.fillStyle = "#ffffff";
                    oCtx.fillRect(radius - 5, 0, 10, size); oCtx.fillRect(0, radius - 5, size, 10);
                    oCtx.fillStyle = "#ff4757"; oCtx.fillRect(radius - 2, 0, 4, size); oCtx.fillRect(0, radius - 2, size, 4);
                } else if (fid === "FR") {
                    oCtx.fillStyle = "#1e90ff"; oCtx.fillRect(0, 0, size * 0.34, size); oCtx.fillStyle = "#ffffff";
                    oCtx.fillRect(size * 0.34, 0, size * 0.34, size); oCtx.fillStyle = "#ff4757"; oCtx.fillRect(size * 0.68, 0, size * 0.34, size);
                } else if (fid === "DE") {
                    oCtx.fillStyle = "#1e272e"; oCtx.fillRect(0, 0, size, size * 0.34); oCtx.fillStyle = "#ff4757";
                    oCtx.fillRect(0, size * 0.34, size, size * 0.34); oCtx.fillStyle = "#ffa502"; oCtx.fillRect(0, size * 0.68, size, size * 0.34);
                } else if (fid === "CA") {
                    oCtx.fillStyle = "#ff4757"; oCtx.fillRect(0, 0, size, size); oCtx.fillStyle = "#ffffff";
                    oCtx.fillRect(size * 0.25, 0, size * 0.5, size); oCtx.fillStyle = "#ff4757"; oCtx.beginPath(); oCtx.arc(radius, radius, 4, 0, Math.PI*2); oCtx.fill();
                } else if (fid === "BR") {
                    oCtx.fillStyle = "#2ed573"; oCtx.fillRect(0, 0, size, size); oCtx.fillStyle = "#ffa502";
                    oCtx.beginPath(); oCtx.moveTo(radius, 3); oCtx.lineTo(size-3, radius); oCtx.lineTo(radius, size-3); oCtx.closePath(); oCtx.fill();
                } else if (fid === "IN") {
                    oCtx.fillStyle = "#ff9f43"; oCtx.fillRect(0, 0, size, size * 0.34); oCtx.fillStyle = "#ffffff";
                    oCtx.fillRect(0, size * 0.34, size, size * 0.34); oCtx.fillStyle = "#10ac84"; oCtx.fillRect(0, size * 0.68, size, size * 0.34);
                } else if (fid === "JP") {
                    oCtx.fillStyle = "#ffffff"; oCtx.fillRect(0, 0, size, size); oCtx.fillStyle = "#ff4757";
                    oCtx.beginPath(); oCtx.arc(radius, radius, radius * 0.45, 0, Math.PI * 2); oCtx.fill();
                }
                cacheMap[fid] = offCanvas;
            });
        }

        function switchTab(type) {
            activeTab = type;
            const headers = ["colors", "flags", "emoji_smilies", "emoji_warriors", "emoji_animals"];
            headers.forEach(h => {
                const element = document.getElementById(`tab${h.charAt(0).toUpperCase() + h.slice(1)}`);
                if(element) element.className = `tab-btn ${type === h ? 'active' : ''}`;
            });
            renderCustomizerItems();
        }

        function renderCustomizerItems() {
            customizerContainer.innerHTML = "";
            if (activeTab === 'colors') {
                clothingColors.forEach(color => {
                    const btn = document.createElement("button");
                    btn.className = `color-btn ${selectedSkin.type === 'color' && selectedSkin.val === color.hex ? 'active' : ''}`;
                    btn.style.backgroundColor = color.hex;
                    btn.onclick = () => { selectedSkin = { type: 'color', val: color.hex }; renderCustomizerItems(); };
                    customizerContainer.appendChild(btn);
                });
            } else if (activeTab === 'flags') {
                flagSkins.forEach(flag => {
                    const btn = document.createElement("button");
                    btn.className = `flag-btn ${selectedSkin.type === 'flag' && selectedSkin.val === flag.id ? 'active' : ''}`;
                    btn.innerHTML = `<span>${flag.emoji}</span> <span>${flag.name}</span>`;
                    btn.onclick = () => { selectedSkin = { type: 'flag', val: flag.id }; renderCustomizerItems(); };
                    customizerContainer.appendChild(btn);
                });
            } else if (emojiCategories[activeTab]) {
                emojiCategories[activeTab].forEach(emojiStr => {
                    const btn = document.createElement("button");
                    btn.className = `flag-btn ${selectedEmojiFace === emojiStr ? 'active' : ''}`;
                    btn.innerHTML = `<span style="font-size:20px;">${emojiStr}</span>`;
                    btn.onclick = () => { selectedEmojiFace = emojiStr; renderCustomizerItems(); };
                    customizerContainer.appendChild(btn);
                });
            }
        }

        class Snake {
            constructor(id, x, y, skinConfig, isNPC = false, explicitName = "") {
                this.id = id;
                this.skin = skinConfig;
                this.isNPC = isNPC;
                this.name = explicitName || (isNPC ? npcNames[Math.floor(Math.random() * npcNames.length)] : "Snake");
                this.angle = Math.random() * Math.PI * 2;
                this.targetLength = 25;
                this.parts = Array.from({ length: this.targetLength }, () => ({ x, y }));
                
                if(this.isNPC) {
                    // Pick a random emoji expression for NPC snakes
                    const allNPCList = [...emojiCategories.emoji_smilies, ...emojiCategories.emoji_warriors];
                    this.npcEmoji = allNPCList[Math.floor(Math.random() * allNPCList.length)];
                }
            }

            update() {
                let head = this.parts[0];

                if (!this.isNPC) {
                    if (inMenu) {
                        this.angle = Math.sin(pulseTime * 2) * 0.4 - Math.PI/2;
                        this.skin = selectedSkin; 
                        this.name = playerNameInput.value.trim() || "Player";
                        mouse.x = canvas.width / 2; mouse.y = canvas.height / 2 - 60;
                    } else {
                        let dist = Math.hypot(mouse.x - head.x, mouse.y - head.y);
                        if (dist > 4) {
                            this.angle = Math.atan2(mouse.y - head.y, mouse.x - head.x);
                        }
                    }
                } else {
                    let danger = false;
                    let sx = head.x + Math.cos(this.angle) * dangerSensorRange;
                    let sy = head.y + Math.sin(this.angle) * dangerSensorRange;

                    if (gameStarted && !gameOver) {
                        player.parts.forEach((p, i) => {
                            if (i > 1 && Math.hypot(sx - p.x, sy - p.y) < thickness * 2.5) danger = true;
                        });
                    }
                    npcs.forEach(npc => {
                        npc.parts.forEach((p, i) => {
                            if (npc.id === this.id && i < 4) return;
                            if (Math.hypot(sx - p.x, sy - p.y) < thickness * 2.5) danger = true;
                        });
                    });

                    if (danger) {
                        this.angle += Math.PI / 2;
                    } else {
                        let target = null; let minDist = attackRange;
                        if (!gameOver && gameStarted) {
                            let d = Math.hypot(head.x - player.parts[0].x, head.y - player.parts[0].y);
                            if (d < minDist) { minDist = d; target = player.parts[0]; }
                        }
                        npcs.forEach(npc => {
                            if (npc.id !== this.id) {
                                let d = Math.hypot(head.x - npc.parts[0].x, head.y - npc.parts[0].y);
                                if (d < minDist) { minDist = d; target = npc.parts[0]; }
                            }
                        });

                        if (target) {
                            this.angle += (Math.atan2(target.y - head.y, target.x - head.x) - this.angle) * 0.12;
                        } else {
                            let food = findClosestFood(head);
                            if (food) this.angle += (Math.atan2(food.y - head.y, food.x - head.x) - this.angle) * 0.06;
                        }
                    }
                }

                let activeSpeed = inMenu && !this.isNPC ? 1.5 : snakeSpeed;
                let newHead = { x: head.x + Math.cos(this.angle) * activeSpeed, y: head.y + Math.sin(this.angle) * activeSpeed };
                this.parts.unshift(newHead);
                
                while (this.parts.length > this.targetLength) this.parts.pop();

                if (head.x < -thickness) { head.x = canvas.width + thickness; this.parts.forEach(p => p.x += canvas.width); }
                else if (head.x > canvas.width + thickness) { head.x = -thickness; this.parts.forEach(p => p.x -= canvas.width); }
                if (head.y < -thickness) { head.y = canvas.height + thickness; this.parts.forEach(p => p.y += canvas.height); }
                else if (head.y > canvas.height + thickness) { head.y = -thickness; this.parts.forEach(p => p.y -= canvas.height); }
            }

            draw() {
                const isColor = this.skin.type === 'color';
                const flagImg = !isColor ? cacheMap[this.skin.val] : null;

                // Render Body Segments
                for (let i = this.parts.length - 1; i >= 0; i--) {
                    let p = this.parts[i];
                    let r = thickness * (1 - i / (this.parts.length * 2.5));
                    if (i === 0) r = thickness + 2; 
                    let size = r * 2;

                    if (isColor) {
                        ctx.fillStyle = this.skin.val;
                        ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2); ctx.fill();
                    } else if (flagImg) {
                        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(this.angle);
                        ctx.drawImage(flagImg, -r, -r, size, size); ctx.restore();
                    }
                }

                // Render Emoji Face perfectly centered and rotated on head
                let head = this.parts[0];
                let currentFace = this.isNPC ? this.npcEmoji : selectedEmojiFace;
                
                ctx.save();
                ctx.translate(head.x, head.y);
                ctx.rotate(this.angle + Math.PI/2); // Align emoji top direction orientation
                ctx.font = `${thickness * 2.1}px Arial`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(currentFace, 0, 0);
                ctx.restore();

                // Render Floating Username Label Above Snake Head
                ctx.save();
                ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
                ctx.font = "bold 12px 'Segoe UI', Arial, sans-serif";
                ctx.textAlign = "center";
                ctx.shadowColor = "#000000"; ctx.shadowBlur = 3;
                ctx.fillText(this.name, head.x, head.y - thickness * 2.0);
                ctx.restore();
            }
        }

        function dropPointsOnDeath(parts, skinColor) {
            parts.forEach((part, index) => {
                if (index % 2 === 0) { 
                    foodArray.push({
                        x: part.x + (Math.random() * 14 - 7),
                        y: part.y + (Math.random() * 14 - 7),
                        color: skinColor || "#00ff88",
                        isSuper: Math.random() < 0.12,
                        baseRadius: 7
                    });
                }
            });
        }

        // Unified Universal Event Handlers for Mouse + Mobile Touch Triggers
        function handleSteerInput(clientX, clientY) {
            if (inMenu) return;
            gameStarted = true;
            mouse.x = clientX;
            mouse.y = clientY;
        }

        window.addEventListener('mousemove', (e) => { if(!isDrawingTouch) handleSteerInput(e.clientX, e.clientY); });
        
        window.addEventListener('touchstart', (e) => {
            isDrawingTouch = true;
            const touch = e.touches[0];
            touchIndicator.style.display = "block";
            touchIndicator.style.left = `${touch.clientX}px`;
            touchIndicator.style.top = `${touch.clientY}px`;
            handleSteerInput(touch.clientX, touch.clientY);
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            touchIndicator.style.left = `${touch.clientX}px`;
            touchIndicator.style.top = `${touch.clientY}px`;
            handleSteerInput(touch.clientX, touch.clientY);
        }, { passive: true });

        window.addEventListener('touchend', () => { touchIndicator.style.display = "none"; }, { passive: true });

        function findClosestFood(head) {
            let closest = null, minDist = Infinity;
            for (let i = 0; i < foodArray.length; i++) {
                let f = foodArray[i];
                let d = Math.hypot(head.x - f.x, head.y - f.y);
                if (d < minDist) { minDist = d; closest = f; }
            }
            return closest;
        }

        function spawnFood() {
            let isSuper = Math.random() < 0.10; 
            return {
                x: Math.random() * (canvas.width - 60) + 30,
                y: Math.random() * (canvas.height - 60) + 30,
                color: isSuper ? "#ffffff" : `hsl(${Math.random() * 360}, 100%, 60%)`,
                isSuper: isSuper,
                baseRadius: isSuper ? 11 : 7 
            };
        }

        function setupArenaEnvironment() {
            score = 0; gameOver = false; gameStarted = false;
            scoreElement.innerText = score;
            forceResize();

            let startX = canvas.width / 2;
            let startY = inMenu ? canvas.height / 2 + 150 : canvas.height / 2;

            let pName = playerNameInput.value.trim() || "Player";
            player = new Snake("player", startX, startY, selectedSkin, false, pName);
            foodArray = Array.from({ length: 30 }, spawnFood);
            
            const npcColors = ["#be2edd", "#f0932b", "#eb4d4b", "#70a1ff", "#eccc68"];
            npcs = npcColors.map((col, idx) => {
                let rx = Math.random() * canvas.width;
                let ry = Math.random() * canvas.height;
                return new Snake(`npc-${idx}`, rx, ry, { type: 'color', val: col }, true);
            });
        }

        function startGame() {
            inMenu = false;
            startScreen.style.display = "none";
            uiLayer.style.display = "block";
            player.name = playerNameInput.value.trim() || "Player";
            player.parts.forEach(p => { p.x = canvas.width / 2; p.y = canvas.height / 2; });
        }

        function tryAgain() {
            gameOverScreen.style.display = "none"; uiLayer.style.display = "block";
            inMenu = false; setupArenaEnvironment();
        }

        function backToMenu() {
            inMenu = true; gameOverScreen.style.display = "none"; startScreen.style.display = "flex";
            setupArenaEnvironment(); renderCustomizerItems();
        }

        function loop() {
            ctx.fillStyle = "#070614"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            pulseTime += 0.07; 

            if (inMenu) {
                player.update();
            } else if (!gameOver) {
                player.update();
                npcs.forEach(npc => npc.update());

                foodArray.forEach((food, index) => {
                    let hitRadius = thickness + food.baseRadius;
                    if (gameStarted && Math.hypot(player.parts[0].x - food.x, player.parts[0].y - food.y) < hitRadius) {
                        score += food.isSuper ? 50 : 10; scoreElement.innerText = score;
                        player.targetLength += food.isSuper ? 12 : 3;
                        foodArray[index] = spawnFood();
                    }
                    npcs.forEach(npc => {
                        if (Math.hypot(npc.parts[0].x - food.x, npc.parts[0].y - food.y) < hitRadius) {
                            npc.targetLength += food.isSuper ? 10 : 2;
                            foodArray[index] = spawnFood();
                        }
                    });
                });

                if (gameStarted) {
                    let pHead = player.parts[0];
                    npcs.forEach(npc => {
                        for (let i = 3; i < npc.parts.length; i++) {
                            if (Math.hypot(pHead.x - npc.parts[i].x, pHead.y - npc.parts[i].y) < thickness) {
                                gameOver = true; uiLayer.style.display = "none";
                                finalScoreElement.innerText = `Final Score: ${score}`;
                                gameOverScreen.style.display = "flex";
                                dropPointsOnDeath(player.parts, player.skin.val);
                            }
                        }
                        let nHead = npc.parts[0];
                        for (let i = 3; i < player.parts.length; i++) {
                            if (Math.hypot(nHead.x - player.parts[i].x, nHead.y - player.parts[i].y) < thickness) {
                                dropPointsOnDeath(npc.parts, npc.skin.val);
                                npc.targetLength = 25; 
                                npc.parts = Array.from({ length: 25 }, () => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height }));
                            }
                        }
                    });
                }
            }

            if (!inMenu) {
                foodArray.forEach(f => {
                    if (f.isSuper) {
                        let animatedRadius = f.baseRadius + Math.sin(pulseTime) * 1.5;
                        ctx.shadowBlur = 10; ctx.shadowColor = "#00f2fe";
                        ctx.fillStyle = "#ffffff";
                        ctx.beginPath(); ctx.arc(f.x, f.y, animatedRadius, 0, Math.PI * 2); ctx.fill();
                        ctx.shadowBlur = 0; 
                    } else {
                        ctx.fillStyle = f.color;
                        ctx.beginPath(); ctx.arc(f.x, f.y, f.baseRadius, 0, Math.PI * 2); ctx.fill();
                    }
                });
                npcs.forEach(npc => npc.draw());
            }

            player.draw(); 
            requestAnimationFrame(loop);
        }

        window.onload = function() {
            preRenderFlagTextures();
            renderCustomizerItems();
            setupArenaEnvironment();
            loop();
        };
    </script>
</body>
</html>
